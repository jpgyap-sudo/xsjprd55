services:
  web:
    build: .
    command: node server.js
    env_file: .env
    ports:
      - "3000:3000"
    depends_on:
      - redis
    restart: unless-stopped

  telegram-bot:
    build: .
    command: node workers/telegram-bot-worker.js
    env_file: .env
    depends_on:
      - redis
    restart: unless-stopped

  market-workers:
    build: .
    command: node workers/market-worker.js
    env_file: .env
    depends_on:
      - redis
    restart: unless-stopped

  research-backtest-workers:
    build: .
    command: node workers/research-backtest-worker.js
    env_file: .env
    depends_on:
      - redis
    restart: unless-stopped

  consultant-brain:
    build: .
    command: node workers/simulation-learning-worker.js
    env_file: .env
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
